buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 23
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22"
        // Force async-storage to use legacy SQLite (avoids shared_storage Maven artifact)
        AsyncStorage_useNextStorage = false
        // Force geolocation to use legacy LocationManager instead of FusedLocationProviderClient
        // This avoids the Play Services class conflict crash on some devices
        RNGeolocation_useLocationManager = true
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
