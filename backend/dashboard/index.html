<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakshak AI - Responder Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>🚨 Rakshak AI</h1>
        <span class="subtitle">Emergency Responder Dashboard</span>
      </div>
      <div class="header-right">
        <div class="status-indicator">
          <span class="status-dot" id="connectionStatus"></span>
          <span id="connectionText">Connecting...</span>
        </div>
        <div class="active-alerts-count">
          <span class="count" id="alertCount">0</span>
          <span class="label">Active Alerts</span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Map Section -->
      <div class="map-section">
        <div id="map"></div>
      </div>

      <!-- Alerts Panel -->
      <div class="alerts-panel">
        <div class="panel-header">
          <h2>Active Distress Signals</h2>
          <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
        </div>
        <div class="alerts-list" id="alertsList">
          <div class="no-alerts">
            <div class="no-alerts-icon">✓</div>
            <p>No active alerts</p>
            <small>Waiting for emergency signals...</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Alert Detail Modal -->
    <div class="modal" id="alertModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Emergency Alert</h2>
          <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- Content loaded dynamically -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
